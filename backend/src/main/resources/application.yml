server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/e_learning?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 220MB

app:
  upload-dir: uploads

deepseek:
  api-key: sk-e9c1770b9ba34658a0a0daa51a1f072c
  base-url: https://api.deepseek.com
  model: deepseek-chat
  timeout-ms: 20000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
